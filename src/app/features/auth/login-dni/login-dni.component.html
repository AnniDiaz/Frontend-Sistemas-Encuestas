<div class="auth-container">
  <div class="auth-box">
    <button class="back-link" (click)="volver()">
      <p><- Volver</p>
    </button>

    <div class="login-card">
        <img class="unsm-logo-img" src="/assets/img/logo_unsm.png" alt="Escudo UNSM">
        <h2>Universidad Nacional
de San Martín</h2>
      <div class="login-header">
        <h2>{{ rol === 'egresado' ? 'Portal del Egresado' : 'Portal de Empresas' }}</h2>
        <p>Ingrese su Documento Nacional de Identidad (DNI) para recuperar sus factores de encuestas.</p>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
   <div class="form-group">
  <label for="doc">
    {{ rol === 'empleador' ? 'REGISTRO ÚNICO DE CONTRIBUYENTE (RUC)' : 'DOCUMENTO NACIONAL DE IDENTIDAD (DNI)' }}
  </label>

  <input
    type="text"
    id="doc"
    name="doc"
    [(ngModel)]="dniValue"
    [placeholder]="rol === 'empleador'
      ? 'Ingrese sus 11 dígitos de RUC'
      : 'Ingrese sus 8 dígitos de DNI'"
    required
    [maxlength]="rol === 'empleador' ? 11 : 8"
    [pattern]="rol === 'empleador' ? '[0-9]{11}' : '[0-9]{8}'"
    inputmode="numeric"
    class="input-control"
    [class.shake]="shakeError"
    autocomplete="off"
  />

</div>
        @if (errorMsg) {
          <div class="error-banner">
            <svg xmlns="http://www.w3.org/2000/svg" height="18" viewBox="0 -960 960 960" width="18" fill="currentColor">
              <path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T803-763q54 54 85.5 127T920-480q0 83-31.5 156T803-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
            </svg>
            <span>{{ errorMsg }}</span>
          </div>
        }

        <button type="submit" class="btn-submit">

          Ingresar al Sistema de Encuestas
        </button>
      </form>

    </div>
  </div>
  <div class="cont-img">

  </div>
</div>
