<div class="auth-container">
  <div class="login-wrapper">
    <button class="back-link" (click)="volver()">
      <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
        <path d="m313-440 224 224-57 57-320-320 320-320 57 57-224 224h487v80H313Z"/>
      </svg>
      Regresar a roles de usuario
    </button>

    <div class="login-card">
      <div class="logo-wrapper">
        <img class="unsm-logo-img" src="assets/unsm.png" alt="Escudo UNSM">
      </div>

      <div class="login-header">
        <span class="auth-badge">Autenticación Segura</span>
        <h2>{{ rol === 'egresado' ? 'INGRESO EGRESADO' : 'INGRESO EMPLEADOR' }}</h2>
        <p>Ingrese su Documento Nacional de Identidad (DNI) para recuperar sus factores de encuestas.</p>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
        <div class="form-group">
          <label for="dni">DOCUMENTO NACIONAL DE IDENTIDAD</label>
          <input 
            type="text" 
            id="dni" 
            name="dni"
            [(ngModel)]="dniValue"
            placeholder="Ingrese sus 8 dígitos numéricos" 
            required 
            maxlength="8"
            pattern="[0-9]{8}"
            inputmode="numeric"
            class="input-control"
            [class.shake]="shakeError"
            autocomplete="off"
          />
        </div>

        @if (errorMsg) {
          <div class="error-banner">
            <svg xmlns="http://www.w3.org/2000/svg" height="18" viewBox="0 -960 960 960" width="18" fill="currentColor">
              <path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T803-763q54 54 85.5 127T920-480q0 83-31.5 156T803-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
            </svg>
            <span>{{ errorMsg }}</span>
          </div>
        }

        <button type="submit" class="btn-submit">
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
            <path d="m382-240 154-154-57-57-97 97-47-47-57 57 104 104Zm98 160q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T803-763q54 54 85.5 127T920-480q0 83-31.5 156T803-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
          </svg>
          Ingresar al Sistema de Encuestas
        </button>
      </form>

      <footer class="sec-footer">
        <svg xmlns="http://www.w3.org/2000/svg" height="14" viewBox="0 -960 960 960" width="14" fill="currentColor">
          <path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 57-140t143-57q83 0 140 57t57 140v80h40q33 0 56.5 23.5T720-560v400q0 33-23.5 56.5T640-80H240Zm0-80h400v-400H240v400Zm240-120q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80ZM240-160v-400 400Z"/>
        </svg>
        <span>Enlace seguro certificado por Oficina de Tecnologías de la Información (OTI-UNSM)</span>
      </footer>
    </div>
  </div>
</div>
